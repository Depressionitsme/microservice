<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikro-Sklep Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
        }

        .btn-load {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            margin-bottom: 3rem;
        }

        .btn-load:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        #content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }

        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 24px;
            transition: border-color 0.3s;
            text-align: center;
        }

        .product-card:hover {
            border-color: var(--primary);
        }

        .product-card h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
        }

        .price {
            color: #818cf8;
            font-weight: 700;
            font-size: 1.5rem;
            display: block;
            margin-bottom: 1rem;
        }

        .buy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .buy-btn:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>

    <h1>MicroShop v1</h1>
    
    <button class="btn-load" onclick="loadProducts()">Odśwież ofertę</button>

    <div id="content">
        <!-- Produkty wpadną tutaj -->
    </div>

    <script>
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const data = await res.json();
                document.getElementById('content').innerHTML = data.map(p => `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <span class="price">${p.price} PLN</span>
                        <button class="buy-btn" onclick="alert('Dodano do koszyka!')">Do koszyka</button>
                    </div>
                `).join('');
            } catch (e) {
                alert("Błąd połączenia z mikroserwerem!");
            }
        }
    </script>
</body>
</html>
