<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alledrogo Micro - Twoje zakupy</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --allegro-orange: #ff5a00;
            --bg-gray: #f2f2f2;
            --text-main: #222;
            --shadow: 0 1px 4px 0 rgba(0,0,0,.15);
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            color: var(--text-main);
        }

        /* Header / Navbar */
        header {
            background: #fff;
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 20px;
        }

        .logo {
            color: var(--allegro-orange);
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
        }

        .search-bar {
            flex-grow: 1;
            display: flex;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid var(--allegro-orange);
            border-radius: 4px 0 0 4px;
            outline: none;
        }

        .search-btn {
            background: var(--allegro-orange);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 0 4px 4px 0;
            font-weight: 600;
            cursor: pointer;
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 15px;
        }

        .card {
            background: #fff;
            border-radius: 4px;
            padding: 15px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background: #f9f9f9;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 14px;
            margin: 5px 0;
            font-weight: 400;
            color: #00a79d; /* Kolor linków w Allegro */
            height: 40px;
            overflow: hidden;
        }

        .price {
            font-size: 22px;
            font-weight: 700;
            margin: 10px 0;
        }

        .smart {
            color: #00a79d;
            font-weight: 800;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .buy-btn {
            background: #fff;
            border: 1px solid var(--allegro-orange);
            color: var(--allegro-orange);
            padding: 8px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }

        .buy-btn:hover {
            background: #fff5f0;
        }

        /* Floating Cart */
        .cart-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 300px;
        }

        .checkout-now {
            background: var(--allegro-orange);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <a href="#" class="logo">alledrogo</a>
        <div class="search-bar">
            <input type="text" placeholder="Czego szukasz?">
            <button class="search-btn">SZUKAJ</button>
        </div>
    </div>
</header>

<main>
    <div class="grid" id="content">
        <!-- Produkty z serwera -->
    </div>
</main>

<div class="cart-float" id="cart-ui">
    <strong>Twój koszyk (<span id="cart-count">0</span>)</strong>
    <div id="cart-items" style="font-size: 12px; margin: 10px 0; max-height: 100px; overflow-y: auto;"></div>
    <button class="checkout-now" onclick="checkout()">DO KASY</button>
</div>

<script>
    let currentProducts = [];
    let cart = [];

    async function loadShop() {
        try {
            const res = await fetch('/api/products');
            currentProducts = await res.json();
            
            const grid = document.getElementById('content');
            grid.innerHTML = currentProducts.map(p => `
                <div class="card">
                    <img src="https://via.placeholder.com/200?text=PRODUKT" alt="foto">
                    <h3>${p.name}</h3>
                    <div class="smart">Alledrogo No-Smart!</div>
                    <div class="price">${p.price},00 zł</div>
                    <button class="buy-btn" onclick="addToCart(${p.id})">do koszyka</button>
                </div>
            `).join('');
        } catch (e) {
            console.error("Błąd ładowania produktów");
        }
    }

    function addToCart(id) {
        const product = currentProducts.find(p => p.id === id);
        if(product) {
            cart.push(product);
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map(i => `• ${i.name}`).join('<br>');
        }
    }

    async function checkout() {
        if (cart.length === 0) return alert("Pusty koszyk!");
        
        try {
            const response = await fetch('/api/orders/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: cart })
            });
            const res = await response.json();
            alert(res.message);
            cart = [];
            document.getElementById('cart-count').innerText = "0";
            document.getElementById('cart-items').innerText = "";
        } catch (err) {
            alert("Błąd mikroserwisu zamówień!");
        }
    }

    window.onload = loadShop;
</script>

</body>
</html>
